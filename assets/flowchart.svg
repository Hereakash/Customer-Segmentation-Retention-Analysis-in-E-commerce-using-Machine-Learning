<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="820" height="680" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold">CSRA Project Pipeline</text>

  <!-- Helper: arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ── Row 1: Raw Data ─────────────────────────────────── -->
  <!-- A: Raw Data -->
  <rect x="310" y="50" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="68" text-anchor="middle" fill="#93c5fd" font-weight="bold">Raw Data</text>
  <text x="410" y="84" text-anchor="middle" fill="#7dd3fc" font-size="11">data/Ecommerce.csv</text>

  <!-- A -> B -->
  <line x1="410" y1="94" x2="410" y2="118" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 2: Streamlit App ────────────────────────────── -->
  <!-- B: Streamlit App -->
  <rect x="310" y="118" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="136" text-anchor="middle" fill="#93c5fd" font-weight="bold">Streamlit App</text>
  <text x="410" y="152" text-anchor="middle" fill="#7dd3fc" font-size="11">app.py</text>

  <!-- B -> C (down-left branch) -->
  <line x1="310" y1="140" x2="160" y2="140" stroke="#64748b" stroke-width="1.5"/>
  <line x1="160" y1="140" x2="160" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B -> F (model branch, right) -->
  <line x1="510" y1="140" x2="660" y2="140" stroke="#64748b" stroke-width="1.5"/>
  <line x1="660" y1="140" x2="660" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B -> G (schema, further right) -->
  <line x1="660" y1="140" x2="760" y2="140" stroke="#64748b" stroke-width="1.5"/>
  <line x1="760" y1="140" x2="760" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B -> O (segmentation, down) -->
  <line x1="410" y1="162" x2="410" y2="480" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── Row 3 (left branch): Preprocessing ─────────────── -->
  <rect x="60" y="210" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#818cf8" stroke-width="1.5"/>
  <text x="160" y="228" text-anchor="middle" fill="#a5b4fc" font-weight="bold">Preprocessing</text>
  <text x="160" y="244" text-anchor="middle" fill="#c7d2fe" font-size="11">date parsing &amp; channel map</text>

  <!-- C -> D -->
  <line x1="160" y1="254" x2="160" y2="278" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 3 (right branch): Load Models ──────────────── -->
  <rect x="560" y="210" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#34d399" stroke-width="1.5"/>
  <text x="660" y="228" text-anchor="middle" fill="#6ee7b7" font-weight="bold">Load Models</text>
  <text x="660" y="244" text-anchor="middle" fill="#a7f3d0" font-size="11">models/*.pkl</text>

  <!-- ── Row 3 (far right): Feature Schema ──────────────── -->
  <rect x="700" y="210" width="110" height="44" rx="8" fill="#1e3a5f" stroke="#34d399" stroke-width="1.5"/>
  <text x="755" y="228" text-anchor="middle" fill="#6ee7b7" font-weight="bold">Feature Schema</text>
  <text x="755" y="244" text-anchor="middle" fill="#a7f3d0" font-size="11">feature_cols.json</text>

  <!-- F -> H, G -> I  (both converge to Predict J) -->
  <line x1="660" y1="254" x2="660" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <line x1="755" y1="254" x2="755" y2="310" stroke="#64748b" stroke-width="1.5"/>
  <line x1="660" y1="340" x2="590" y2="340" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="755" y1="310" x2="590" y2="340" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 4 (left): Analytics Filters ────────────────── -->
  <rect x="60" y="278" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#818cf8" stroke-width="1.5"/>
  <text x="160" y="296" text-anchor="middle" fill="#a5b4fc" font-weight="bold">Analytics Filters</text>
  <text x="160" y="312" text-anchor="middle" fill="#c7d2fe" font-size="11">channels, category, device</text>

  <!-- D -> E -->
  <line x1="160" y1="322" x2="160" y2="346" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- D -> O (segmentation link) -->
  <line x1="260" y1="300" x2="310" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <line x1="310" y1="300" x2="310" y2="500" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 5 (left): Dashboards ───────────────────────── -->
  <rect x="60" y="346" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#f472b6" stroke-width="1.5"/>
  <text x="160" y="364" text-anchor="middle" fill="#f9a8d4" font-weight="bold">Dashboards</text>
  <text x="160" y="380" text-anchor="middle" fill="#fbcfe8" font-size="11">Overview / Marketing / Cart</text>

  <!-- ── Row 5 (right): Predict ─────────────────────────── -->
  <rect x="410" y="318" width="168" height="44" rx="8" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="494" y="336" text-anchor="middle" fill="#fcd34d" font-weight="bold">Predict</text>
  <text x="494" y="352" text-anchor="middle" fill="#fde68a" font-size="11">predict + predict_proba</text>

  <!-- J -> K, L, M, N  (fan out) -->
  <line x1="494" y1="362" x2="494" y2="400" stroke="#64748b" stroke-width="1.5"/>
  <line x1="494" y1="400" x2="310" y2="400" stroke="#64748b" stroke-width="1.5"/>
  <line x1="494" y1="400" x2="670" y2="400" stroke="#64748b" stroke-width="1.5"/>

  <!-- K: Single Prediction -->
  <rect x="220" y="410" width="178" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="310" y1="400" x2="310" y2="410" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="309" y="434" text-anchor="middle" fill="#fde68a" font-size="12">Single Prediction Page</text>

  <!-- L: Batch Prediction -->
  <rect x="408" y="410" width="178" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="494" y1="400" x2="494" y2="410" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="497" y="434" text-anchor="middle" fill="#fde68a" font-size="12">Batch Prediction Page</text>

  <!-- M: Risk Ranking -->
  <rect x="596" y="410" width="158" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="670" y1="400" x2="670" y2="410" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="675" y="434" text-anchor="middle" fill="#fde68a" font-size="12">Risk Ranking + Actions</text>

  <!-- N: Prediction History -->
  <rect x="596" y="456" width="158" height="36" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="670" y1="446" x2="670" y2="456" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="675" y="480" text-anchor="middle" fill="#cbd5e1" font-size="12">Prediction History</text>

  <!-- ── Row 6 (bottom): Segmentation ───────────────────── -->
  <rect x="310" y="500" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="410" y="518" text-anchor="middle" fill="#c4b5fd" font-weight="bold">Segmentation</text>
  <text x="410" y="534" text-anchor="middle" fill="#ddd6fe" font-size="11">RFM + KMeans clustering</text>

  <!-- O -> P -->
  <line x1="410" y1="544" x2="410" y2="568" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 7: KMeans ───────────────────────────────────── -->
  <rect x="310" y="568" width="200" height="44" rx="8" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="410" y="586" text-anchor="middle" fill="#c4b5fd" font-weight="bold">RFM + StandardScaler</text>
  <text x="410" y="602" text-anchor="middle" fill="#ddd6fe" font-size="11">+ KMeans Clusters</text>

  <!-- Legend -->
  <rect x="20" y="630" width="780" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="30" y="648" fill="#94a3b8" font-size="11">Legend:</text>
  <rect x="80" y="637" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="648" fill="#94a3b8" font-size="11">Data/App</text>
  <rect x="160" y="637" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#818cf8" stroke-width="1.5"/>
  <text x="180" y="648" fill="#94a3b8" font-size="11">Analytics</text>
  <rect x="240" y="637" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#34d399" stroke-width="1.5"/>
  <text x="260" y="648" fill="#94a3b8" font-size="11">Models</text>
  <rect x="310" y="637" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="648" fill="#94a3b8" font-size="11">Predictions</text>
  <rect x="400" y="637" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="420" y="648" fill="#94a3b8" font-size="11">Segmentation</text>
  <rect x="500" y="637" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#f472b6" stroke-width="1.5"/>
  <text x="520" y="648" fill="#94a3b8" font-size="11">Dashboards</text>
</svg>
